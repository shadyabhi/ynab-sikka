<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#1a73e8" />

  <!-- Bar chart representing financial reporting -->
  <rect x="28" y="72" width="14" height="28" rx="2" fill="#ffffff" opacity="0.9"/>
  <rect x="47" y="52" width="14" height="48" rx="2" fill="#ffffff" opacity="0.9"/>
  <rect x="66" y="60" width="14" height="40" rx="2" fill="#ffffff" opacity="0.9"/>
  <rect x="85" y="38" width="14" height="62" rx="2" fill="#ffffff" opacity="0.9"/>

  <!-- Upward trend line -->
  <polyline points="35,68 54,48 73,56 92,34" fill="none" stroke="#4ade80" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Arrow tip on trend line -->
  <polygon points="92,34 85,38 89,42" fill="#4ade80"/>

  <!-- Dollar sign at top -->
  <text x="64" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">$</text>
</svg>
